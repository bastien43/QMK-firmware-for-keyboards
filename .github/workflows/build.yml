name: Build QMK Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # permet de lancer manuellement depuis GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install QMK CLI
        run: pip install qmk

      - name: Setup QMK
        run: |
          qmk setup -H . -y

      - name: Copy keymap into QMK keyboards
        run: |
          mkdir -p keyboards/lily58/lily58/keymaps/custom
          cp -r lily58/lily58/keymaps/custom/* keyboards/lily58/lily58/keymaps/custom/

      - name: Compile firmware
        run: |
          qmk compile -kb lily58/lily58 -km custom

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: lily58_custom_firmware
          path: |
            *.uf2
            *.hex
          if-no-files-found: warn
